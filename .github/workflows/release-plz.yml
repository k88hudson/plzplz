name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz-release:
    name: Release-plz release
    environment: release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'k88hudson' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - &check-token
        name: Validate RELEASE_PLZ_TOKEN
        env:
          TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::RELEASE_PLZ_TOKEN secret is not set. Add it in repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          response=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $TOKEN" https://api.github.com/repos/${{ github.repository }})
          if [ "$response" != "200" ]; then
            echo "::error::RELEASE_PLZ_TOKEN is invalid or expired (HTTP $response). Regenerate it at GitHub Settings > Developer settings > Personal access tokens and update the repo secret."
            exit 1
          fi
        shell: bash
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'k88hudson' }}
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *check-token
      - *checkout
      - *install-rust
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
